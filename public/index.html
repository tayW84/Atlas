<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas Network Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <img class="brand-logo" src="/logo.png" alt="Atlas logo" />
        <div>
          <p class="brand-title">ATLAS</p>
          <h1>Network Map</h1>
        </div>
      </div>
      <div class="header-actions">
        <label for="subnet-input">Subnet</label>
        <input id="subnet-input" type="text" placeholder="192.168.1.0/24" />
        <button id="run-scan-btn">Run Nmap Scan</button>
        <button id="refresh-btn">Refresh</button>
      </div>
    </header>

    <main>
      <section id="graph-panel">
        <div id="cy"></div>
      </section>
      <aside id="details-panel">
        <h2>Selection Details</h2>
        <p id="host-hostname">Right-click nodes to connect or annotate them.</p>
        <p id="host-ip"></p>
        <p id="host-domain"></p>
        <a id="scan-file-link" href="#" target="_blank" rel="noopener noreferrer" aria-disabled="true">Open Nmap scan file</a>
        <p id="scan-status" role="status" aria-live="polite"></p>
        <h3>Node Notes</h3>
        <p id="node-note">Select a host or domain node to inspect details.</p>
        <h3>Edge Details</h3>
        <p id="edge-summary"></p>
        <p id="edge-note">Select an edge to inspect or annotate it.</p>
        <h3>Open Ports</h3>
        <ul id="ports-list"></ul>
        <h3>Host Script Results</h3>
        <ul id="host-script-results-list"></ul>
      </aside>
    </main>

    <div id="context-menu" class="context-menu" hidden>
      <button id="context-connect-btn" type="button">Start connection</button>
      <button id="context-note-btn" type="button">Add note</button>
      <button id="context-cancel-connect-btn" type="button" hidden>Cancel connection mode</button>
      <button id="context-close-btn" type="button">Close menu</button>
    </div>

    <script src="https://unpkg.com/cytoscape@3.30.3/dist/cytoscape.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
