<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Atlas Network Map</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header>
      <div class="brand">
        <img src="/logo.png" alt="Atlas logo" class="brand-logo" />
        <div>
          <p class="brand-title">ATLAS</p>
          <h1>Network Map</h1>
        </div>
      </div>
      <button id="refresh-btn">Refresh</button>
    </header>

    <main>
      <section id="graph-panel">
        <div id="cy"></div>
      </section>
      <aside id="details-panel">
        <h2>Host Details</h2>
        <p id="host-hostname">Click a host node to inspect services.</p>
        <p id="host-ip"></p>
        <p id="host-domain"></p>
        <a id="scan-file-link" href="#" target="_blank" rel="noopener noreferrer" aria-disabled="true">Open Nmap scan file</a>
        <h3>Open Ports</h3>
        <ul id="ports-list"></ul>
        <h3>Host Script Results</h3>
        <ul id="host-script-results-list"></ul>
      </aside>
    </main>

    <script src="https://unpkg.com/cytoscape@3.30.3/dist/cytoscape.min.js"></script>
    <script src="/app.js"></script>
  </body>
</html>
